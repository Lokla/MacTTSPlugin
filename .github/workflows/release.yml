name: Package Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version label (e.g. v1.0.0)"
        required: false
        default: "dev"
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      ACT_DOWNLOAD_URL: https://advancedcombattracker.com/download.php?id=57

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Mono and zip tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-complete zip unzip curl

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using VERSION=$VERSION"

      - name: Download official ACT package
        run: |
          mkdir -p "$RUNNER_TEMP/act"
          curl -fL "$ACT_DOWNLOAD_URL" -o "$RUNNER_TEMP/act/ACTv3.zip"
          unzip -q "$RUNNER_TEMP/act/ACTv3.zip" -d "$RUNNER_TEMP/act/extracted"

      - name: Resolve ACT reference path
        id: actref
        shell: bash
        run: |
          ACT_REF="$(find "$RUNNER_TEMP/act/extracted" -type f -name 'Advanced Combat Tracker.exe' | head -n 1)"
          if [[ -z "$ACT_REF" ]]; then
            echo "Could not locate Advanced Combat Tracker.exe in downloaded package."
            exit 1
          fi
          echo "act_reference=$ACT_REF" >> "$GITHUB_OUTPUT"
          echo "Using ACT reference: $ACT_REF"

      - name: Build plugin against official ACT identity
        run: |
          cd MacTTSPlugin
          xbuild MacTTSPlugin.csproj \
            /p:Configuration=Release \
            /p:ACTReferencePath="${{ steps.actref.outputs.act_reference }}"

      - name: Make package script executable
        run: chmod +x scripts/package_release.sh

      - name: Package release zip
        run: |
          scripts/package_release.sh "${{ steps.version.outputs.version }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacTTSPlugin-${{ steps.version.outputs.version }}
          path: |
            dist/MacTTSPlugin-${{ steps.version.outputs.version }}.zip
            dist/MacTTSPlugin-${{ steps.version.outputs.version }}/

      - name: Publish to GitHub Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MacTTSPlugin-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
